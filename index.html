<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEHS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23004587'/><text x='50' y='72' font-size='64' text-anchor='middle'>🐾</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #004587;
            --navy-dark: #002a52;
            --navy-deep: #001a35;
            --gold: #fbba07;
            --gold-dark: #d99f00;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--navy-deep);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
            position: relative;
        }

        /* Geometric background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 20%, rgba(0,69,135,0.6) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 80%, rgba(0,42,82,0.8) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Diagonal stripe accent */
        body::after {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 55%;
            height: 140%;
            background: linear-gradient(180deg, rgba(251,186,7,0.04) 0%, rgba(251,186,7,0.08) 50%, rgba(251,186,7,0.02) 100%);
            transform: skewX(-12deg);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            text-align: center;
        }

        /* Logo / wordmark */
        .logo {
            margin-bottom: 3rem;
            animation: fade-down 0.6s ease both;
        }

        .logo-mark {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 5.5rem;
            line-height: 0.9;
            color: var(--gold);
            letter-spacing: -2px;
            text-shadow: 0 4px 24px rgba(251,186,7,0.3);
        }

        .logo-sub {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-top: 0.3rem;
        }

        /* Cards */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }

        .card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.8rem 2rem;
            text-align: left;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            animation: fade-up 0.6s ease both;
        }

        .card:nth-child(1) { animation-delay: 0.15s; }
        .card:nth-child(2) { animation-delay: 0.28s; }

        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 4px 0 0 4px;
            transition: width 0.25s ease;
        }

        .card-resources::before { background: var(--gold); }
        .card-games::before { background: #10b981; }

        .card:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.2);
            transform: translateX(6px);
            box-shadow: -6px 0 24px rgba(0,0,0,0.3);
        }

        .card:hover::before { width: 6px; }

        .card-resources:hover { box-shadow: -6px 0 24px rgba(251,186,7,0.15); }
        .card-games:hover { box-shadow: -6px 0 24px rgba(16,185,129,0.15); }

        .card-inner {
            display: flex;
            align-items: center;
            gap: 1.4rem;
        }

        .card-icon {
            font-size: 2.6rem;
            flex-shrink: 0;
            line-height: 1;
        }

        .card-text { flex: 1; }

        .card-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 1.55rem;
            letter-spacing: 0.5px;
            color: var(--white);
            line-height: 1;
            margin-bottom: 0.35rem;
        }

        .card-desc {
            font-size: 0.88rem;
            font-weight: 400;
            color: rgba(255,255,255,0.5);
            line-height: 1.4;
        }

        .card-arrow {
            font-size: 1.4rem;
            color: rgba(255,255,255,0.25);
            transition: color 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .card:hover .card-arrow {
            color: rgba(255,255,255,0.6);
            transform: translateX(4px);
        }

        /* Footer */
        .footer {
            margin-top: 2.5rem;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
            animation: fade-up 0.6s 0.4s ease both;
        }

        @keyframes fade-down {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .logo-mark { font-size: 4rem; }
            .card { padding: 1.4rem 1.4rem; }
            .card-icon { font-size: 2rem; }
            .card-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-mark">SEHS</div>
            <div class="logo-sub">Sport &amp; Exercise Sciences</div>
        </div>

        <div class="cards">
            <a class="card card-resources" href="resources.html">
                <div class="card-inner">
                    <div class="card-icon">📚</div>
                    <div class="card-text">
                        <div class="card-title">SEHS Resources</div>
                        <div class="card-desc">Revision tools, activities &amp; learning materials</div>
                    </div>
                    <div class="card-arrow">→</div>
                </div>
            </a>

            <a class="card card-games" href="games.html">
                <div class="card-inner">
                    <div class="card-icon">🎮</div>
                    <div class="card-text">
                        <div class="card-title">Archie's Games</div>
                        <div class="card-desc">School-friendly games &amp; challenges</div>
                    </div>
                    <div class="card-arrow">→</div>
                </div>
            </a>
        </div>

        <div class="footer">sehs.info</div>
    </div>
</body>
</html>
